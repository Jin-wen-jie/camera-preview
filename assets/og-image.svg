<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#151a1f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Title -->
  <text x="600" y="220" text-anchor="middle" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="96" font-weight="700" fill="#ffffff">语音花雨</text>
  <text x="600" y="290" text-anchor="middle" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="36" fill="rgba(255,255,255,0.6)">说出「花」，让花海绽放</text>
  <!-- Decorative emojis -->
  <text x="200" y="500" text-anchor="middle" font-size="80" opacity="0.8">🌸</text>
  <text x="600" y="520" text-anchor="middle" font-size="70" opacity="0.6">❄️</text>
  <text x="1000" y="500" text-anchor="middle" font-size="75" opacity="0.7">💕</text>
  <!-- Floating particles -->
  <text x="350" y="400" font-size="30" opacity="0.3">🌸</text>
  <text x="750" y="380" font-size="25" opacity="0.3">❄️</text>
  <text x="500" y="450" font-size="28" opacity="0.25">💖</text>
  <text x="850" y="430" font-size="22" opacity="0.2">🌸</text>
  <text x="400" y="550" font-size="24" opacity="0.2">💮</text>
  <text x="680" y="560" font-size="26" opacity="0.2">❆</text>
</svg>
