name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npm test

      - name: Verify HTML is valid
        run: node -e "
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          console.log('index.html size:', html.length, 'bytes');
          console.log('Has doctype:', html.includes('<!DOCTYPE html>'));
          console.log('Has lang:', html.includes('lang='));
          console.log('Has viewport:', html.includes('viewport'));
        "
