<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>语音花雨</title>
    <link rel="stylesheet" href="./styles.css?v=voice-only">
</head>
<body>
<main class="app-shell">
    <section class="effect-area">
        <div class="voice-effect-layer" data-voice-effects aria-hidden="true"></div>
    </section>

    <aside class="control-panel">
        <h1>语音花雨</h1>
        <p class="intro">说出「花」，让花雨落下</p>

        <div class="voice-command-panel">
            <div class="voice-command-row">
                <span class="voice-command-label">语音指令</span>
                <span data-voice-command-text>等待语音…</span>
            </div>
            <div class="voice-command-row">
                <strong data-voice-command-result data-state="idle">点击下方按钮开始识别</strong>
            </div>
        </div>

        <div class="status-row" data-caption-status>
            <span>字幕</span>
            <strong data-state="idle">未启动</strong>
        </div>
        <button class="primary-button" data-caption-start>开启字幕</button>
        <button class="secondary-button" data-caption-stop disabled>关闭字幕</button>

        <form class="effect-command" data-effect-form>
            <span class="effect-command-label">手动输入</span>
            <div class="effect-command-row">
                <input
                    class="effect-command-input"
                    type="text"
                    data-effect-input
                    placeholder="输入「花」"
                    aria-label="输入指令触发特效"
                >
                <button class="primary-button" type="submit" data-effect-submit>执行</button>
            </div>
            <div class="status-row" data-effect-status>
                <strong data-state="idle">输入指令触发特效</strong>
            </div>
        </form>

        <p class="hint">浏览器需允许麦克风权限 · 推荐 Chrome</p>
    </aside>

    <div class="caption-overlay" data-live-caption data-state="idle" aria-live="polite">
        点击「开启字幕」开始识别语音
    </div>
</main>

<script type="module" src="./src/app.js?v=voice-only"></script>
</body>
</html>
