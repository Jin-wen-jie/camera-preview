<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>摄像头预览</title>
    <link rel="stylesheet" href="./styles.css?v=head-anchor">
  </head>
  <body>
    <main class="camera-shell" aria-labelledby="page-title">
      <section class="preview-panel">
        <div class="preview-frame">
          <video
            class="camera-preview"
            data-camera-preview
            autoplay
            muted
            playsinline
            aria-label="笔记本摄像头画面"
          ></video>
          <div class="preview-placeholder" aria-hidden="true">
            <span></span>
          </div>
          <div class="voice-effect-layer" data-voice-effects aria-hidden="true"></div>
          <div class="caption-overlay" data-live-caption data-state="idle" aria-live="polite">
            字幕将在这里显示
          </div>
        </div>
      </section>

      <aside class="control-panel">
        <p class="eyebrow">Local camera</p>
        <h1 id="page-title">笔记本摄像头预览</h1>
        <p class="intro">点击开启后，浏览器会请求摄像头权限。授权成功后，画面会直接显示在左侧。</p>

        <div class="status-row" data-camera-status data-state="idle" role="status" aria-live="polite">
          摄像头未开启
        </div>

        <div class="actions" aria-label="摄像头控制">
          <button class="primary-button" type="button" data-camera-start>开启摄像头</button>
          <button class="secondary-button" type="button" data-camera-stop>停止</button>
        </div>

        <div class="status-row caption-status" data-caption-status data-state="idle" role="status" aria-live="polite">
          实时字幕未开启
        </div>

        <div class="actions" aria-label="实时字幕控制">
          <button class="secondary-button" type="button" data-caption-start>开启字幕</button>
          <button class="secondary-button" type="button" data-caption-stop>停止字幕</button>
        </div>

        <form class="effect-command" data-effect-form>
          <label class="effect-command-label" for="effect-command-input">文字指令</label>
          <div class="effect-command-row">
            <input
              id="effect-command-input"
              class="effect-command-input"
              data-effect-input
              type="text"
              autocomplete="off"
              placeholder="在我头上放一朵花"
            >
            <button class="primary-button" type="submit">执行</button>
          </div>
        </form>

        <div class="status-row effect-status" data-effect-status data-state="idle" role="status" aria-live="polite">
          等待文字指令
        </div>

        <p class="hint">如果看不到权限弹窗，请确认正在通过 localhost 或 HTTPS 打开页面。</p>
      </aside>
    </main>

    <script type="module" src="./src/app.js?v=head-anchor"></script>
  </body>
</html>
